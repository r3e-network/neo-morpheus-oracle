name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/export-public-runtime-catalog.mjs --output /tmp/morpheus-runtime-catalog.json >/dev/null
      - run: cmp -s /tmp/morpheus-runtime-catalog.json apps/web/public/morpheus-runtime-catalog.json
      - run: node scripts/check-web-consistency.mjs
      - run: npm run format:check
      - run: npm run lint

  web-and-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm --prefix workers/phala-worker test
      - run: npm --prefix workers/morpheus-relayer test
      - run: npm --prefix apps/web run test:run
      - run: npm --prefix apps/web run build

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: dotnet tool install --global Neo.Compiler.CSharp --version 3.9.1
      - run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
      - run: bash contracts/build.sh
      - run: node --test scripts/contract-build-regressions.test.mjs
      - run: dotnet test contracts/__tests__/NeoContracts.Tests.csproj
