name: publish-images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'workers/phala-worker/**'
      - 'workers/morpheus-relayer/**'
      - 'scripts/**'
      - 'config/**'
      - '.github/workflows/publish-images.yml'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: phala-worker
            dockerfile: workers/phala-worker/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/neo-morpheus-oracle-phala-worker
          - name: morpheus-relayer
            dockerfile: workers/morpheus-relayer/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/neo-morpheus-oracle-relayer
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
