# Morpheus Oracle — PUBLIC confidential execution-runtime gateway (AA edge migration).
#
# LIVE since 2026-06-15 as /etc/nginx/conf.d/morpheus-runtime.conf (see
# AA-EDGE-MIGRATION-RUNBOOK.md "Deployment record"). Makes the AWS Nitro box a valid
# execution runtime for the Cloudflare control plane, replacing the dead Phala runtime
# + the Vercel "emergency-vercel-runtime" placeholder.
#
# TLS: the deployed origin cert is SELF-SIGNED (the meshmini.app zone runs Cloudflare
# SSL mode "Full", non-strict, which does not validate the origin cert). certbot is NOT
# required. The server also listens on :80 so Cloudflare works in either Full or
# Flexible mode; only Cloudflare-proxied traffic should reach the box.
#
# Flow:  control plane --HTTPS--> THIS nginx (TLS) --> 127.0.0.1:8787 (the host
#        socat bridge from start-nitro-signer.sh) --vsock--> the merged enclave's
#        execution-plane passthrough --in-process--> the worker handler (compute
#        in-TEE). Requests are auth-gated by the enclave (Bearer execution token).
#
# SECURITY: this server block proxies ONLY the control plane's EXECUTION_PLANE
# routes (+ /health, /attestation). The enclave's sensitive routes (/provision,
# /sign/payload, /keys/derived, /oracle/fulfill, /feed/sign) are NOT exposed here —
# they stay reachable only from the host (relayer/feed-pusher) over the same vsock
# bridge, never from the public internet. Everything not explicitly allowed -> 404.

server {
    listen 80;
    listen 443 ssl;
    # Dedicated runtime hostname; only Cloudflare-proxied traffic should arrive here.
    server_name runtime.meshmini.app;

    ssl_certificate     /etc/morpheus/tls/runtime.meshmini.app.crt;
    ssl_certificate_key /etc/morpheus/tls/runtime.meshmini.app.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Hard request-size cap (the enclave also caps at ENCLAVE_MAX_BODY_BYTES).
    client_max_body_size 256k;

    # Liveness + attestation (open; the attestation is a signed measurement).
    location = /health        { proxy_pass http://127.0.0.1:8787/health; }
    location ~ ^/(mainnet|testnet)/health$      { proxy_pass http://127.0.0.1:8787; }
    location ~ ^/(mainnet|testnet)/attestation$ { proxy_pass http://127.0.0.1:8787; }

    # The control plane's confidential EXECUTION_PLANE_ROUTES, network-prefixed.
    # Keep this regex IN SYNC with EXECUTION_PLANE_PASSTHROUGH in enclave-server.mjs
    # and EXECUTION_PLANE_ROUTES in the control plane.
    location ~ ^/(mainnet|testnet)/(oracle/query|oracle/smart-fetch|oracle/decrypt|oracle/message-reveal|compute/execute|neodid/(bind|action-ticket|recovery-ticket))$ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Nitro-Token $http_x_nitro_token;
        proxy_set_header Connection "";
        proxy_read_timeout 35s;
        proxy_pass http://127.0.0.1:8787;
    }

    # Everything else is refused — do NOT widen this without review.
    location / { return 404; }
}
