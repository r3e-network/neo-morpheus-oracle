services:
  morpheus-feed-relayer:
    image: ${MORPHEUS_RELAYER_IMAGE:-ghcr.io/r3e-network/neo-morpheus-oracle-relayer:latest}
    container_name: morpheus-feed-relayer
    restart: unless-stopped
    depends_on:
      phala-worker:
        condition: service_healthy
    env_file:
      - ${MORPHEUS_LOCAL_ENV_FILE:-./morpheus.mainnet.env}
    environment:
      PHALA_API_URL: http://phala-worker:${PHALA_WORKER_PORT:-8080}
      MORPHEUS_RELAYER_MODE: feed_only
      MORPHEUS_RELAYER_STATE_FILE: /data/.morpheus-relayer-state.feed_only.${MORPHEUS_NETWORK:-mainnet}.${MORPHEUS_RELAYER_NEO_N3_START_BLOCK:-default}.json
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - morpheus-data:/data

  morpheus-request-relayer:
    image: ${MORPHEUS_RELAYER_IMAGE:-ghcr.io/r3e-network/neo-morpheus-oracle-relayer:latest}
    container_name: morpheus-request-relayer
    restart: unless-stopped
    depends_on:
      phala-worker:
        condition: service_healthy
    env_file:
      - ${MORPHEUS_LOCAL_ENV_FILE:-./morpheus.mainnet.env}
    environment:
      PHALA_API_URL: http://phala-worker:${PHALA_WORKER_PORT:-8080}
      MORPHEUS_RELAYER_MODE: requests_only
      MORPHEUS_RELAYER_STATE_FILE: /data/.morpheus-relayer-state.requests_only.${MORPHEUS_NETWORK:-mainnet}.${MORPHEUS_RELAYER_NEO_N3_START_BLOCK:-default}.json
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - morpheus-data:/data
