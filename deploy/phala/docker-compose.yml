services:
  phala-worker:
    image: ${MORPHEUS_PHALA_WORKER_IMAGE:-ghcr.io/r3e-network/neo-morpheus-oracle-phala-worker:latest}
    container_name: morpheus-phala-worker
    restart: unless-stopped
    env_file:
      - ${MORPHEUS_LOCAL_ENV_FILE:-./morpheus.mainnet.env}
    environment:
      PORT: ${PHALA_WORKER_PORT:-8080}
    expose:
      - "${PHALA_WORKER_PORT:-8080}"
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - morpheus-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:' + (process.env.PORT || 8080) + '/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  caddy:
    image: caddy:2-alpine
    container_name: morpheus-caddy
    restart: unless-stopped
    depends_on:
      phala-worker:
        condition: service_healthy
    profiles: ["edge"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  morpheus-relayer:
    image: ${MORPHEUS_RELAYER_IMAGE:-ghcr.io/r3e-network/neo-morpheus-oracle-relayer:latest}
    container_name: morpheus-relayer
    restart: unless-stopped
    depends_on:
      phala-worker:
        condition: service_healthy
    env_file:
      - ${MORPHEUS_LOCAL_ENV_FILE:-./morpheus.mainnet.env}
    environment:
      PHALA_API_URL: http://phala-worker:${PHALA_WORKER_PORT:-8080}
      MORPHEUS_RELAYER_STATE_FILE: /data/.morpheus-relayer-state.${MORPHEUS_NETWORK:-mainnet}.${MORPHEUS_RELAYER_NEO_N3_START_BLOCK:-default}.json
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - morpheus-data:/data

volumes:
  morpheus-data:
  caddy-data:
  caddy-config:
