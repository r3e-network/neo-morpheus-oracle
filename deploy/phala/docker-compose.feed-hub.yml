services:
  mainnet-feed-worker:
    image: ${MORPHEUS_PHALA_WORKER_IMAGE}
    restart: unless-stopped
    environment:
      PORT: 8080
      PHALA_SHARED_SECRET: ${PHALA_SHARED_SECRET}
      PHALA_API_TOKEN: ${PHALA_API_TOKEN}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
      MORPHEUS_UPSTASH_GUARDS_ENABLED: ${MORPHEUS_UPSTASH_GUARDS_ENABLED}
      MORPHEUS_UPSTASH_FAIL_CLOSED: ${MORPHEUS_UPSTASH_FAIL_CLOSED}
      MORPHEUS_RUNTIME_CONFIG_JSON: ${MAINNET_RUNTIME_CONFIG_JSON}
    expose:
      - '8080'
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - morpheus-feed-data:/data
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  testnet-feed-worker:
    image: ${MORPHEUS_PHALA_WORKER_IMAGE}
    restart: unless-stopped
    environment:
      PORT: 8080
      PHALA_SHARED_SECRET: ${PHALA_SHARED_SECRET}
      PHALA_API_TOKEN: ${PHALA_API_TOKEN}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
      MORPHEUS_UPSTASH_GUARDS_ENABLED: ${MORPHEUS_UPSTASH_GUARDS_ENABLED}
      MORPHEUS_UPSTASH_FAIL_CLOSED: ${MORPHEUS_UPSTASH_FAIL_CLOSED}
      MORPHEUS_RUNTIME_CONFIG_JSON: ${TESTNET_RUNTIME_CONFIG_JSON}
    expose:
      - '8080'
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - morpheus-feed-data:/data
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  mainnet-feed-relayer:
    image: ${MORPHEUS_RELAYER_IMAGE}
    restart: unless-stopped
    depends_on:
      mainnet-feed-worker:
        condition: service_healthy
    environment:
      PHALA_API_URL: http://mainnet-feed-worker:8080
      PHALA_SHARED_SECRET: ${PHALA_SHARED_SECRET}
      PHALA_API_TOKEN: ${PHALA_API_TOKEN}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY}
      MORPHEUS_RUNTIME_CONFIG_JSON: ${MAINNET_RUNTIME_CONFIG_JSON}
      MORPHEUS_RELAYER_MODE: feed_only
      MORPHEUS_RELAYER_STATE_FILE: /data/.morpheus-relayer-state.feed_only.mainnet.json
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - morpheus-feed-data:/data

  testnet-feed-relayer:
    image: ${MORPHEUS_RELAYER_IMAGE}
    restart: unless-stopped
    depends_on:
      testnet-feed-worker:
        condition: service_healthy
    environment:
      PHALA_API_URL: http://testnet-feed-worker:8080
      PHALA_SHARED_SECRET: ${PHALA_SHARED_SECRET}
      PHALA_API_TOKEN: ${PHALA_API_TOKEN}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY}
      MORPHEUS_RUNTIME_CONFIG_JSON: ${TESTNET_RUNTIME_CONFIG_JSON}
      MORPHEUS_RELAYER_MODE: feed_only
      MORPHEUS_RELAYER_STATE_FILE: /data/.morpheus-relayer-state.feed_only.testnet.json
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - morpheus-feed-data:/data

volumes:
  morpheus-feed-data:
