services:
  phala-worker:
    image: ${MORPHEUS_PHALA_WORKER_IMAGE}
    restart: unless-stopped
    environment:
      PORT: ${PHALA_WORKER_PORT}
      PHALA_SHARED_SECRET: ${PHALA_SHARED_SECRET}
      PHALA_API_TOKEN: ${PHALA_API_TOKEN}
      TWELVEDATA_API_KEY: ${TWELVEDATA_API_KEY}
      ORACLE_TIMEOUT: ${ORACLE_TIMEOUT}
      ORACLE_SCRIPT_TIMEOUT_MS: ${ORACLE_SCRIPT_TIMEOUT_MS}
      COMPUTE_SCRIPT_TIMEOUT_MS: ${COMPUTE_SCRIPT_TIMEOUT_MS}
      PHALA_USE_DERIVED_KEYS: ${PHALA_USE_DERIVED_KEYS}
      PHALA_EMIT_ATTESTATION: ${PHALA_EMIT_ATTESTATION}
      PHALA_DSTACK_ENDPOINT: ${PHALA_DSTACK_ENDPOINT}
      PHALA_DSTACK_NEO_N3_KEY_PATH: ${PHALA_DSTACK_NEO_N3_KEY_PATH}
      PHALA_DSTACK_NEOX_KEY_PATH: ${PHALA_DSTACK_NEOX_KEY_PATH}
      PHALA_DSTACK_ORACLE_ENCRYPTION_KEY_PATH: ${PHALA_DSTACK_ORACLE_ENCRYPTION_KEY_PATH}
      PHALA_ORACLE_KEYSTORE_PATH: ${PHALA_ORACLE_KEYSTORE_PATH}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      MORPHEUS_PROVIDER_CONFIG_API_KEY: ${MORPHEUS_PROVIDER_CONFIG_API_KEY}
      MORPHEUS_NETWORK: ${MORPHEUS_NETWORK}
      NEO_RPC_URL: ${NEO_RPC_URL}
      NEO_NETWORK_MAGIC: ${NEO_NETWORK_MAGIC}
      CONTRACT_MORPHEUS_ORACLE_HASH: ${CONTRACT_MORPHEUS_ORACLE_HASH}
      CONTRACT_ORACLE_CALLBACK_CONSUMER_HASH: ${CONTRACT_ORACLE_CALLBACK_CONSUMER_HASH}
      CONTRACT_MORPHEUS_DATAFEED_HASH: ${CONTRACT_MORPHEUS_DATAFEED_HASH}
      PHALA_NEO_N3_WIF: ${PHALA_NEO_N3_WIF}
      PHALA_NEO_N3_PRIVATE_KEY: ${PHALA_NEO_N3_PRIVATE_KEY}
      NEOX_RPC_URL: ${NEOX_RPC_URL}
      NEOX_CHAIN_ID: ${NEOX_CHAIN_ID}
      CONTRACT_MORPHEUS_ORACLE_X_ADDRESS: ${CONTRACT_MORPHEUS_ORACLE_X_ADDRESS}
      CONTRACT_ORACLE_CALLBACK_CONSUMER_X_ADDRESS: ${CONTRACT_ORACLE_CALLBACK_CONSUMER_X_ADDRESS}
      CONTRACT_MORPHEUS_DATAFEED_X_ADDRESS: ${CONTRACT_MORPHEUS_DATAFEED_X_ADDRESS}
      PHALA_NEOX_PRIVATE_KEY: ${PHALA_NEOX_PRIVATE_KEY}
      MORPHEUS_FEED_PROJECT_SLUG: ${MORPHEUS_FEED_PROJECT_SLUG}
      MORPHEUS_FEED_PROVIDER: ${MORPHEUS_FEED_PROVIDER}
    expose:
      - "${PHALA_WORKER_PORT}"
    volumes:
      - morpheus-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:' + (process.env.PORT || 8080) + '/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      phala-worker:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - /tmp/data:/data
      - /tmp/config:/config
    command: |
      caddy reverse-proxy --from :80 --to phala-worker:${PHALA_WORKER_PORT}

  morpheus-relayer:
    image: ${MORPHEUS_RELAYER_IMAGE}
    restart: unless-stopped
    depends_on:
      phala-worker:
        condition: service_healthy
    environment:
      PHALA_API_URL: http://phala-worker:${PHALA_WORKER_PORT}
      PHALA_SHARED_SECRET: ${PHALA_SHARED_SECRET}
      PHALA_API_TOKEN: ${PHALA_API_TOKEN}
      PHALA_USE_DERIVED_KEYS: ${PHALA_USE_DERIVED_KEYS}
      PHALA_DSTACK_ENDPOINT: ${PHALA_DSTACK_ENDPOINT}
      PHALA_DSTACK_RELAYER_NEO_N3_KEY_PATH: ${PHALA_DSTACK_RELAYER_NEO_N3_KEY_PATH}
      PHALA_DSTACK_RELAYER_NEOX_KEY_PATH: ${PHALA_DSTACK_RELAYER_NEOX_KEY_PATH}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      MORPHEUS_NETWORK: ${MORPHEUS_NETWORK}
      NEO_RPC_URL: ${NEO_RPC_URL}
      NEO_NETWORK_MAGIC: ${NEO_NETWORK_MAGIC}
      CONTRACT_MORPHEUS_ORACLE_HASH: ${CONTRACT_MORPHEUS_ORACLE_HASH}
      CONTRACT_ORACLE_CALLBACK_CONSUMER_HASH: ${CONTRACT_ORACLE_CALLBACK_CONSUMER_HASH}
      NEOX_RPC_URL: ${NEOX_RPC_URL}
      NEOX_CHAIN_ID: ${NEOX_CHAIN_ID}
      CONTRACT_MORPHEUS_ORACLE_X_ADDRESS: ${CONTRACT_MORPHEUS_ORACLE_X_ADDRESS}
      CONTRACT_ORACLE_CALLBACK_CONSUMER_X_ADDRESS: ${CONTRACT_ORACLE_CALLBACK_CONSUMER_X_ADDRESS}
      MORPHEUS_RELAYER_NEO_N3_WIF: ${MORPHEUS_RELAYER_NEO_N3_WIF}
      MORPHEUS_RELAYER_NEO_N3_PRIVATE_KEY: ${MORPHEUS_RELAYER_NEO_N3_PRIVATE_KEY}
      MORPHEUS_RELAYER_NEOX_PRIVATE_KEY: ${MORPHEUS_RELAYER_NEOX_PRIVATE_KEY}
      MORPHEUS_RELAYER_POLL_INTERVAL_MS: ${MORPHEUS_RELAYER_POLL_INTERVAL_MS}
      MORPHEUS_RELAYER_CONCURRENCY: ${MORPHEUS_RELAYER_CONCURRENCY}
      MORPHEUS_RELAYER_MAX_BLOCKS_PER_TICK: ${MORPHEUS_RELAYER_MAX_BLOCKS_PER_TICK}
      MORPHEUS_RELAYER_MAX_RETRIES: ${MORPHEUS_RELAYER_MAX_RETRIES}
      MORPHEUS_RELAYER_RETRY_BASE_DELAY_MS: ${MORPHEUS_RELAYER_RETRY_BASE_DELAY_MS}
      MORPHEUS_RELAYER_RETRY_MAX_DELAY_MS: ${MORPHEUS_RELAYER_RETRY_MAX_DELAY_MS}
      MORPHEUS_RELAYER_PROCESSED_CACHE_SIZE: ${MORPHEUS_RELAYER_PROCESSED_CACHE_SIZE}
      MORPHEUS_RELAYER_DEAD_LETTER_LIMIT: ${MORPHEUS_RELAYER_DEAD_LETTER_LIMIT}
      MORPHEUS_RELAYER_LOG_FORMAT: ${MORPHEUS_RELAYER_LOG_FORMAT}
      MORPHEUS_RELAYER_LOG_LEVEL: ${MORPHEUS_RELAYER_LOG_LEVEL}
      MORPHEUS_RELAYER_STATE_FILE: /data/.morpheus-relayer-state.json
    volumes:
      - morpheus-data:/data

volumes:
  morpheus-data:
