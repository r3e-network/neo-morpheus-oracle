services:
  phala-worker:
    image: ${MORPHEUS_PHALA_WORKER_IMAGE}
    restart: unless-stopped
    environment:
      PORT: ${PHALA_WORKER_PORT}
      PHALA_SHARED_SECRET: ${PHALA_SHARED_SECRET}
      PHALA_API_TOKEN: ${PHALA_API_TOKEN}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      MORPHEUS_RUNTIME_CONFIG_JSON: ${MORPHEUS_RUNTIME_CONFIG_JSON}
    expose:
      - '${PHALA_WORKER_PORT}'
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - morpheus-data:/data
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:' + (process.env.PORT || 8080) + '/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      phala-worker:
        condition: service_healthy
    ports:
      - '${MORPHEUS_PUBLIC_PORT:-3000}:80'
    volumes:
      - /tmp/data:/data
      - /tmp/config:/config
    command: |
      caddy reverse-proxy --from :80 --to phala-worker:${PHALA_WORKER_PORT}

  morpheus-relayer:
    image: ${MORPHEUS_RELAYER_IMAGE}
    restart: unless-stopped
    depends_on:
      phala-worker:
        condition: service_healthy
    environment:
      PHALA_API_URL: http://phala-worker:${PHALA_WORKER_PORT}
      PHALA_SHARED_SECRET: ${PHALA_SHARED_SECRET}
      PHALA_API_TOKEN: ${PHALA_API_TOKEN}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      MORPHEUS_RUNTIME_CONFIG_JSON: ${MORPHEUS_RUNTIME_CONFIG_JSON}
      MORPHEUS_RELAYER_STATE_FILE: /data/.morpheus-relayer-state.${MORPHEUS_NETWORK}.${MORPHEUS_RELAYER_NEO_N3_START_BLOCK}.json
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - morpheus-data:/data

volumes:
  morpheus-data:
